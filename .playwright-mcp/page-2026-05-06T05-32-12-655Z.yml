                - generic [ref=e83]: Najisi Mughalladha (Nzito) — Hii ni najisi ngumu zaidi. Inajumuisha mate ya mbwa na nguruwe. Husafishwa kwa kunawa mara saba, mara moja kwa udongo.
              - listitem [ref=e84]:
                - generic [ref=e85]: "02"
                - generic [ref=e86]: Najisi Mutawassita (Wastani) — Hii ndiyo kawaida ya najisi, kama vile mkojo, damu, na kinyesi. Husafishwa kwa maji tu hadi athari zitoweke.
              - listitem [ref=e87]:
                - generic [ref=e88]: "03"
                - generic [ref=e89]: Najisi Mukhaffafa (Nyepesi) — Hii ndiyo najisi nyepesi zaidi. Mfano ni mkojo wa mtoto mchanga wa kiume ambaye bado hajala chakula chochote isipokuwa maziwa ya mama. Husafishwa kwa kunyunyiza maji tu.
            - heading "JINSI YA KUSAFISHA NAJISI" [level=3] [ref=e90]
            - paragraph [ref=e91]: Ili mahali au kitu kiwe safi tena, sharti maji yaendeshwe juu ya najisi mpaka athari (rangi, harufu, ladha) zitoweke. Iwapo athari zimekauka na hazionekani, inakuwa ya kutosha kunawa mara moja kwa maji mengi.
