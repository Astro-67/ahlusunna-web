              - generic [ref=e63]: Published
            - img [ref=e67]
          - generic [ref=e71]:
            - paragraph [ref=e72]: In Islam, impurity (najasah) refers to physical filth that prevents a person from performing worship such as prayer. Understanding the types of impurity is essential for every Muslim to maintain proper ritual cleanliness.
            - paragraph [ref=e73]: "Allah says: \"Indeed, Allah loves those who repent and loves those who purify themselves.\" (Al-Baqarah 2:222)"
            - heading "QURANIC VERSE" [level=3] [ref=e246]
            - figure "(Al-Baqarah 2:222)" [ref=e75]:
              - paragraph [ref=e76]:
                - generic [ref=e77]: إِنَّ اللَّهَ يُحِبُّ التَّوَّابِينَ وَيُحِبُّ الْمُتَطَهِّرِينَ
              - generic [ref=e78]: (Al-Baqarah 2:222)
            - heading "THE THREE TYPES OF IMPURITY" [level=3] [ref=e247]
            - list [ref=e80]:
              - listitem [ref=e81]:
                - generic [ref=e82]: "01"
                - generic [ref=e83]: Heavy Impurity (Mughalladha) — The most severe type, including the saliva of dogs and pigs. Purified by washing seven times, once with soil mixed into the water.
              - listitem [ref=e84]:
                - generic [ref=e85]: "02"
                - generic [ref=e86]: "Medium Impurity (Mutawassita) — The common type: urine, blood, feces. Purified by removing it completely with water until no trace of color, smell, or taste remains."
              - listitem [ref=e87]:
                - generic [ref=e88]: "03"
                - generic [ref=e89]: Light Impurity (Mukhaffafa) — The mildest type, such as the urine of a male infant who has not yet eaten solid food. Purified simply by sprinkling water over the area.
            - heading "HOW TO PURIFY IMPURITY" [level=3] [ref=e248]
            - paragraph [ref=e91]: The substance, color, smell, and taste of the impurity must all be removed. If the substance is gone but a trace of color or smell remains that is difficult to remove, it is pardoned. Water is poured over the affected area until the impurity is judged to be fully gone.
